name: Frontend Confidence

on:
  pull_request:
  push:

concurrency:
  group: frontend-confidence-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  MIX_ENV: test
  PGHOST: 127.0.0.1
  PGPORT: 5432
  PLAYWRIGHT_BROWSER_CHANNEL: chromium

jobs:
  frontend-confidence:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: eboss_test
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d eboss_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19.5"
          otp-version: "28.3"

      - uses: actions/setup-node@v4
        with:
          node-version: "25.9.0"
          cache: npm
          cache-dependency-path: apps/eboss_web/assets/package-lock.json

      - name: Install Elixir dependencies
        run: mix deps.get

      - name: Install asset dependencies
        run: npm ci
        working-directory: apps/eboss_web/assets

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
        working-directory: apps/eboss_web/assets

      - name: Run frontend gate
        run: mix frontend.gate
